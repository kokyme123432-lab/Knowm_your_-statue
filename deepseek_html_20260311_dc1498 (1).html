<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ رحلة المشاعر ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap');

* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Tajawal', 'Cairo', sans-serif;
}

:root {
--primary-color: #6366f1;
--primary-glow: #818cf8;
--secondary-color: #8b5cf6;
--accent-color: #f43f5e;
--bg-gradient-1: #0f172a;
--bg-gradient-2: #1e1b4b;
--bg-gradient-3: #2d1b4e;
--text-primary: #f8fafc;
--text-secondary: #cbd5e1;
--card-bg: rgba(30, 41, 59, 0.7);
--card-border: rgba(99, 102, 241, 0.3);
--card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
--success-color: #10b981;
--danger-color: #ef4444;
--heart-color: #ff3366;
}

body {
background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
background-size: 400% 400%;
animation: gradientShift 15s ease infinite;
color: var(--text-primary);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
position: relative;
overflow: hidden;
}

@keyframes gradientShift {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* قلوب متحركة في الخلفية */
.floating-hearts {
position: fixed;
width: 100%;
height: 100%;
top: 0;
left: 0;
z-index: 1;
overflow: hidden;
pointer-events: none;
}

.heart {
position: absolute;
color: var(--heart-color);
font-size: 24px;
opacity: 0.6;
animation: floatHeart 8s linear infinite;
text-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
}

@keyframes floatHeart {
0% {
transform: translateY(100vh) scale(0.5) rotate(0deg);
opacity: 0;
}
10% {
opacity: 0.8;
}
50% {
transform: translateY(50vh) scale(1.2) rotate(180deg);
opacity: 0.6;
}
90% {
opacity: 0.8;
}
100% {
transform: translateY(-20vh) scale(0.8) rotate(360deg);
opacity: 0;
}
}

.floating-shapes {
position: fixed;
width: 100%;
height: 100%;
top: 0;
left: 0;
z-index: 0;
overflow: hidden;
pointer-events: none;
}

.shape {
position: absolute;
background: var(--primary-glow);
filter: blur(60px);
opacity: 0.15;
border-radius: 50%;
animation: float 20s infinite;
}

.shape:nth-child(1) { width: 300px; height: 300px; top: 10%; left: 10%; }
.shape:nth-child(2) { width: 400px; height: 400px; bottom: 10%; right: 10%; background: var(--secondary-color); animation-delay: -5s; }
.shape:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 50%; background: var(--accent-color); animation-delay: -10s; }

@keyframes float {
0%, 100% { transform: translate(0, 0) scale(1); }
50% { transform: translate(0, 100px) scale(1.1); }
}

.game-container {
position: relative;
z-index: 10;
width: 100%;
max-width: 600px;
padding: 20px;
}

.start-screen {
background: var(--card-bg);
backdrop-filter: blur(10px);
border: 1px solid var(--card-border);
border-radius: 60px;
padding: 3rem 2rem;
text-align: center;
box-shadow: var(--card-shadow);
animation: fadeIn 1s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: scale(0.9); }
to { opacity: 1; transform: scale(1); }
}

.play-container {
display: flex;
justify-content: center;
align-items: center;
margin: 1rem 0;
}

.play-circle {
width: 200px;
height: 200px;
background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--accent-color));
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
box-shadow: 0 0 50px var(--primary-glow);
transition: all 0.3s ease;
animation: pulse 2s infinite;
}

.play-circle:hover {
transform: scale(1.1);
box-shadow: 0 0 80px var(--primary-glow);
}

@keyframes pulse {
0% { box-shadow: 0 0 30px var(--primary-glow); }
50% { box-shadow: 0 0 80px var(--primary-glow); }
100% { box-shadow: 0 0 30px var(--primary-glow); }
}

.play-triangle {
width: 0;
height: 0;
border-top: 45px solid transparent;
border-bottom: 45px solid transparent;
border-right: 80px solid white;
filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
transition: all 0.3s;
}

.play-circle:hover .play-triangle {
transform: scale(1.1);
border-right-color: #fff;
}

.hint-text {
color: var(--text-secondary);
font-size: 1.2rem;
margin-top: 2rem;
opacity: 0.8;
}

.game-screen {
background: var(--card-bg);
backdrop-filter: blur(10px);
border: 1px solid var(--card-border);
border-radius: 60px;
padding: 3rem 2rem;
box-shadow: var(--card-shadow);
display: none;
animation: slideUp 0.5s ease;
text-align: center;
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(50px); }
to { opacity: 1; transform: translateY(0); }
}

.stage-indicator {
display: flex;
justify-content: center;
gap: 1rem;
margin-bottom: 2rem;
flex-wrap: wrap;
}

.stage-dot {
width: 15px;
height: 15px;
border-radius: 50%;
background: rgba(255,255,255,0.2);
transition: all 0.3s;
}

.stage-dot.active {
background: var(--primary-color);
box-shadow: 0 0 20px var(--primary-glow);
transform: scale(1.2);
}

.stage-dot.completed {
background: var(--heart-color);
box-shadow: 0 0 20px var(--heart-color);
}

.message-box {
background: rgba(0,0,0,0.3);
border: 2px solid var(--card-border);
border-radius: 40px;
padding: 2rem;
margin: 2rem 0;
font-size: 1.8rem;
line-height: 1.6;
text-align: center;
animation: messageGlow 2s infinite;
}

@keyframes messageGlow {
0% { border-color: var(--card-border); }
50% { border-color: var(--primary-color); }
100% { border-color: var(--card-border); }
}

.message-box.special {
border: 3px solid var(--heart-color);
background: linear-gradient(135deg, rgba(255,51,102,0.2), rgba(255,51,102,0.1));
}

.next-stage-btn {
background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
color: white;
border: none;
padding: 1.5rem 4rem;
border-radius: 60px;
font-size: 1.5rem;
font-weight: 700;
cursor: pointer;
transition: all 0.3s;
margin: 2rem 0;
box-shadow: 0 10px 30px -5px var(--primary-color);
animation: buttonPulse 2s infinite;
}

.next-stage-btn:hover {
transform: translateY(-5px) scale(1.05);
box-shadow: 0 20px 40px -5px var(--primary-glow);
}

@keyframes buttonPulse {
0% { transform: scale(1); }
50% { transform: scale(1.05); }
100% { transform: scale(1); }
}

.final-message {
background: linear-gradient(135deg, rgba(255,51,102,0.3), rgba(99,102,241,0.3));
border: 3px solid var(--heart-color);
border-radius: 60px;
padding: 3rem 2rem;
margin: 2rem 0;
animation: finalGlow 2s infinite;
}

@keyframes finalGlow {
0% { box-shadow: 0 0 30px var(--heart-color); }
50% { box-shadow: 0 0 80px var(--heart-color); }
100% { box-shadow: 0 0 30px var(--heart-color); }
}

.final-message h2 {
font-size: 2.5rem;
margin-bottom: 1rem;
background: linear-gradient(135deg, var(--heart-color), var(--primary-color), var(--secondary-color));
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}

.final-message p {
font-size: 2rem;
margin: 1rem 0;
color: var(--text-primary);
}

.reset-btn {
background: transparent;
border: 1px solid var(--card-border);
color: var(--text-secondary);
padding: 1rem 2rem;
border-radius: 50px;
font-size: 1.2rem;
cursor: pointer;
transition: all 0.3s;
margin-top: 1rem;
}

.reset-btn:hover {
border-color: var(--heart-color);
color: var(--heart-color);
}

.toast {
position: fixed;
top: 20px;
left: 50%;
transform: translateX(-50%);
background: linear-gradient(135deg, var(--heart-color), var(--primary-color));
color: white;
padding: 1rem 2rem;
border-radius: 50px;
z-index: 1000;
box-shadow: 0 10px 30px rgba(0,0,0,0.3);
animation: slideDown 0.3s ease;
}

@keyframes slideDown {
from { transform: translate(-50%, -100px); opacity: 0; }
to { transform: translate(-50%, 0); opacity: 1; }
}

@media (max-width: 600px) {
.message-box { font-size: 1.5rem; padding: 1.5rem; }
.next-stage-btn { padding: 1.2rem 2rem; font-size: 1.2rem; }
}
</style>
</head>
<body>

<!-- قلوب متحركة في الخلفية -->
<div class="floating-hearts" id="floatingHearts"></div>

<div class="floating-shapes">
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
</div>

<div class="game-container">

<!-- شاشة البداية -->
<div id="startScreen" class="start-screen">
<div class="play-container">
<div class="play-circle" id="playButton">
<div class="play-triangle"></div>
</div>
</div>
<div class="hint-text">❤️ اضغط لتبدأ الرحلة ❤️</div>
</div>

<!-- شاشة اللعبة (المراحل) -->
<div id="gameScreen" class="game-screen">
<div class="stage-indicator" id="stageIndicator"></div>

<div id="messageBox" class="message-box">
👋 مرحباً بك في رحلة المشاعر
</div>

<button id="nextStageBtn" class="next-stage-btn">👉 اضغط لتكمل الرحلة</button>
<button id="resetGameBtn" class="reset-btn" onclick="resetToStart()">🔄 بداية جديدة</button>
</div>

</div>

<script>
// ========== إنشاء قلوب متحركة ==========
function createFloatingHearts() {
const heartsContainer = document.getElementById('floatingHearts');
const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '💘', '💝'];

for (let i = 0; i < 25; i++) {
setTimeout(() => {
const heart = document.createElement('div');
heart.className = 'heart';
heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
heart.style.left = Math.random() * 100 + '%';
heart.style.fontSize = (Math.random() * 30 + 15) + 'px';
heart.style.animationDuration = (Math.random() * 8 + 5) + 's';
heart.style.animationDelay = Math.random() * 5 + 's';
heart.style.opacity = Math.random() * 0.7 + 0.3;
heartsContainer.appendChild(heart);

// إزالة القلب بعد انتهاء الأنيميشن
setTimeout(() => {
heart.remove();
}, 13000);
}, i * 300);
}

// استمرار إنشاء القلوب
setTimeout(createFloatingHearts, 8000);
}

// ========== 7 مراحل للرحلة ==========
const stages = [
"💭 لو عايز تعرف قيمتك عندي... كمل الرحلة دي",
"✨ أنت إنسان مميز... بس لسه في كتير عايز أقولهولك",
"💫 لو فعلاً بتحبني... كمل معايا",
"🌟 كمان خطوة وهتعرف قد إيه أنت غالي",
"💖 أنت في قلبي... بس لسة في مفاجأة",
"🎯 خطوة واحدة ووصلنا",
"💕 أنت جميل وبحب ضحكتك وقلبك الأبيض 💕"
];

// الكلمات السرية المتغيرة للمرحلة الأخيرة
const secretMessages = [
"💕 أنت أجمل إنسان في الكون 💕",
"✨ أنت نور حياتي ✨",
"💖 أنت حلم جميل تحقق 💖",
"🌟 أنت كل شيء بالنسبة لي 🌟",
"💗 أنت سبب ابتسامتي 💗",
"❤️ أنت نصفي الآخر ❤️",
"💘 أنت قصة حب لا تنتهي 💘"
];

let currentStage = 0;
let gameActive = true;

// ========== عناصر الصفحة ==========
const startScreen = document.getElementById('startScreen');
const gameScreen = document.getElementById('gameScreen');
const playButton = document.getElementById('playButton');
const messageBox = document.getElementById('messageBox');
const nextStageBtn = document.getElementById('nextStageBtn');
const stageIndicator = document.getElementById('stageIndicator');

// ========== أصوات ==========
function playClickSound() {
try {
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const now = audioContext.currentTime;

for (let i = 0; i < 3; i++) {
const osc = audioContext.createOscillator();
const gain = audioContext.createGain();

osc.type = 'sine';
osc.frequency.value = 800 + (i * 200);

gain.gain.setValueAtTime(0.1, now + i * 0.05);
gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.1);

osc.connect(gain);
gain.connect(audioContext.destination);

osc.start(now + i * 0.05);
osc.stop(now + i * 0.05 + 0.15);
}
} catch(e) {}
}

function playWinSound() {
try {
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const now = audioContext.currentTime;

const notes = [523.25, 659.25, 783.99, 1046.50];
notes.forEach((freq, i) => {
const osc = audioContext.createOscillator();
const gain = audioContext.createGain();

osc.type = 'sine';
osc.frequency.value = freq;

gain.gain.setValueAtTime(0.1, now + i * 0.1);
gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);

osc.connect(gain);
gain.connect(audioContext.destination);

osc.start(now + i * 0.1);
osc.stop(now + i * 0.1 + 0.2);
});
} catch(e) {}
}

// ========== تشغيل الصوت مع أي نقرة ==========
document.addEventListener('click', playClickSound);

// ========== بدء اللعبة ==========
playButton.addEventListener('click', function() {
startScreen.style.display = 'none';
gameScreen.style.display = 'block';
resetGame();
});

// ========== إعادة تعيين الرحلة ==========
function resetGame() {
currentStage = 0;
gameActive = true;
updateStage();
updateStageIndicator();
}

// ========== الرجوع للشاشة الرئيسية ==========
function resetToStart() {
gameScreen.style.display = 'none';
startScreen.style.display = 'block';
}

// ========== تحديث المرحلة الحالية ==========
function updateStage() {
if (currentStage < stages.length) {
const stage = stages[currentStage];
messageBox.textContent = stage;
messageBox.classList.remove('special');
    
// لو وصلنا للمرحلة الأخيرة نغير شكل الصندوق
if (currentStage === stages.length - 1) {
    messageBox.classList.add('special');
    nextStageBtn.textContent = "🎊 اكتشف المفاجأة 🎊";
} else {
    nextStageBtn.textContent = "👉 اضغط لتكمل الرحلة 👈";
}

updateStageIndicator();
}
}

// ========== تحديث مؤشر المراحل ==========
function updateStageIndicator() {
let dots = '';
for (let i = 0; i < stages.length; i++) {
let dotClass = 'stage-dot';
if (i === currentStage) {
dotClass += ' active';
} else if (i < currentStage) {
dotClass += ' completed';
}
dots += `<div class="${dotClass}"></div>`;
}
stageIndicator.innerHTML = dots;
}

// ========== الانتقال للمرحلة التالية ==========
nextStageBtn.addEventListener('click', function() {
if (!gameActive) return;

if (currentStage < stages.length - 1) {
// مش لسة في الرحلة
currentStage++;
updateStage();
playWinSound();
showToast(`✨ وصلت للمرحلة ${currentStage + 1} ✨`);
} else if (currentStage === stages.length - 1) {
// وصلنا لآخر مرحلة - نظهر الرسالة النهائية باختيار عشوائي
showFinalMessage();
}
});

// ========== عرض الرسالة النهائية (بكلمة سرية متغيرة) ==========
function showFinalMessage() {
gameActive = false;
nextStageBtn.style.display = 'none';

// إخفاء المؤشرات القديمة
stageIndicator.style.display = 'none';
messageBox.style.display = 'none';

// اختيار كلمة سرية عشوائية
const randomIndex = Math.floor(Math.random() * secretMessages.length);
const selectedSecret = secretMessages[randomIndex];

// إنشاء الرسالة النهائية
const finalDiv = document.createElement('div');
finalDiv.className = 'final-message';
finalDiv.innerHTML = `
<h2>${selectedSecret}</h2>
<div style="font-size: 4rem; margin-top: 1rem; animation: pulse 2s infinite;">
❤️ ✨ 💖 ✨ 💕
</div>
`;

gameScreen.appendChild(finalDiv);

playWinSound();
playWinSound();
showToast('🎉 وصلت لنهاية الرحلة 🎉');
}

// ========== إظهار إشعار ==========
function showToast(msg) {
const toast = document.createElement('div');
toast.className = 'toast';
toast.textContent = msg;
document.body.appendChild(toast);

setTimeout(() => {
toast.remove();
}, 2000);
}

// ========== تهيئة ==========
window.onload = function() {
createFloatingHearts();
console.log("الرحلة جاهزة مع 7 مراحل وقلوب حمراء!");
};
</script>

</body>
</html>
